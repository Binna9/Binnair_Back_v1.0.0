# =========================
# Database
# =========================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://postgres:5432/binnair}
spring.datasource.username=${DATABASE_USER_NAME:binnair}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:30000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}
spring.datasource.hikari.auto-commit=true

# =========================
# Elasticsearch
# =========================
spring.elasticsearch.uris=${ELASTIC_URL:}
spring.elasticsearch.username=${ELASTIC_USERNAME:}
spring.elasticsearch.password=${ELASTIC_PASSWORD:}

# =========================
# Redis
# =========================
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

# =========================
# JWT
# =========================
spring.jwt.secret=${JWT_SECRET:}
spring.jwt.oauth2-secret=${JWT_OAUTH2_SECRET:}
spring.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
spring.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:259200000}

# =========================
# OAuth2 Google
# =========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:https://localhost/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# =========================
# File Paths
# =========================
file.user.upload-dir=${USER_UPLOAD_DIR}
file.product.upload-dir=${PRODUCT_UPLOAD_DIR}
file.board.upload-dir=${BOARD_UPLOAD_DIR}
file.default.upload=${DEFAULT_UPLOAD_DIR}

# =========================
# Logging
# =========================
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.bb.ballBin=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_SPRING_WEB:WARN}