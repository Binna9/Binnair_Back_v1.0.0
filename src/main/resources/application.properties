spring.application.name=binnair
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server
server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}
server.forward-headers-strategy=framework

# Thymeleaf
spring.thymeleaf.check-template-location=false

# File
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# custom file path aliases
file.user.upload-dir=${USER_UPLOAD_DIR}
file.product.upload-dir=${PRODUCT_UPLOAD_DIR}
file.board.upload-dir=${BOARD_UPLOAD_DIR}
file.default.upload=${DEFAULT_UPLOAD_DIR}

# JPA
spring.jpa.properties.hibernate.transaction.coordinator_class=jdbc
spring.jpa.open-in-view=false

# Message
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.web.locale=ko_KR
spring.web.locale-resolver=fixed

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.display-request-duration=true
